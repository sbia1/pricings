<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StaffCo — Pricing Concepts v3</title>
<style>
  :root { --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
</style>
<style>
[data-theme="dark"] {
  --bg: #080B0F;
  --bg2: #0D1117;
  --surface: #111620;
  --surface2: #161C28;
  --surface-hover: #1B2233;
  --border: #1E2738;
  --border2: #273044;
  --text: #E2E8F5;
  --text-dim: #7A8BA8;
  --text-muted: #3D4F6A;
  --nav-bg: rgba(8,11,15,0.94);
  --shadow: 0 4px 30px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 50px rgba(0,0,0,0.7);
  --tbl-alt: rgba(255,255,255,0.012);
  --tbl-hover: rgba(255,255,255,0.018);
  --input-bg: rgba(255,255,255,0.04);
  --tag-new-bg: rgba(251,146,60,0.12);
  --tag-new-color: #FB923C;
}
[data-theme="light"] {
  --bg: #F4F6FB;
  --bg2: #EDF0F7;
  --surface: #FFFFFF;
  --surface2: #F8FAFD;
  --surface-hover: #F0F3FA;
  --border: #DDE2EF;
  --border2: #C8CFDF;
  --text: #1A2540;
  --text-dim: #4B5C7A;
  --text-muted: #92A0BA;
  --nav-bg: rgba(244,246,251,0.94);
  --shadow: 0 4px 30px rgba(0,30,80,0.08);
  --shadow-lg: 0 8px 50px rgba(0,30,80,0.14);
  --tbl-alt: rgba(0,0,0,0.018);
  --tbl-hover: rgba(0,0,0,0.028);
  --input-bg: rgba(0,0,0,0.03);
  --tag-new-bg: rgba(251,146,60,0.1);
  --tag-new-color: #EA7914;
}
:root {
  --blue: #3B82F6; --font-mono: var(--font); --font-sans: var(--font);
  --blue-dim: rgba(59,130,246,0.14); --blue-glow: rgba(59,130,246,0.22); --blue-h: #5B9BFF;
  --green: #10B981; --green-dim: rgba(16,185,129,0.14);
  --orange: #F59E0B; --orange-dim: rgba(245,158,11,0.12);
  --purple: #8B5CF6; --purple-dim: rgba(139,92,246,0.14);
  --cyan: #06B6D4; --cyan-dim: rgba(6,182,212,0.13);
  --red: #EF4444; --red-dim: rgba(239,68,68,0.12);
  --r: 14px; --rs: 10px; --rx: 7px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: opacity 0.3s;
}
[data-theme="dark"] body::before {
  background: radial-gradient(ellipse 70% 50% at 15% 0%, rgba(59,130,246,0.06), transparent),
    radial-gradient(ellipse 50% 60% at 90% 90%, rgba(139,92,246,0.04), transparent);
}
[data-theme="light"] body::before {
  background: radial-gradient(ellipse 70% 50% at 15% 0%, rgba(59,130,246,0.05), transparent),
    radial-gradient(ellipse 50% 60% at 90% 90%, rgba(139,92,246,0.03), transparent);
}

/* ═══ NAV ═══ */
.nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(18px) saturate(180%); border-bottom: 1px solid var(--border); transition: background 0.3s, border-color 0.3s; }
.nav-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 12px; height: 58px; padding: 0 20px; }
.logo { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--text); margin-right: 8px; white-space: nowrap; }
.logo em { font-style: normal; color: var(--blue); }
.logo span { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: 0; margin-left: 3px; }

.tabs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; padding: 4px 0; flex: 1; }
.tabs::-webkit-scrollbar { display: none; }
.tab { font-size: 10.5px; letter-spacing: 0.03em; padding: 7px 13px; border-radius: 8px; border: 1px solid transparent; background: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px; font-family: var(--font); }
.tab:hover { color: var(--text-dim); background: var(--input-bg); }
.tab.active { color: var(--blue); border-color: rgba(59,130,246,0.3); background: var(--blue-dim); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.tab.active .tab-dot { opacity: 1; }

.theme-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 12px 6px 8px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.2s; font-size: 11px; color: var(--text-dim); font-family: var(--font); white-space: nowrap; flex-shrink: 0; }
.theme-toggle:hover { border-color: var(--border2); color: var(--text); }
.theme-toggle svg { width: 14px; height: 14px; transition: transform 0.4s; }
[data-theme="light"] .theme-toggle svg { transform: rotate(180deg); }
.tt-track { width: 30px; height: 16px; border-radius: 100px; background: var(--border2); position: relative; transition: background 0.25s; flex-shrink: 0; }
[data-theme="light"] .tt-track { background: var(--blue); }
.tt-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--text-muted); position: absolute; top: 2px; left: 2px; transition: all 0.25s; }
[data-theme="light"] .tt-thumb { left: 16px; background: #fff; }

/* ═══ PAGE ═══ */
.page { position: relative; z-index: 1; }
.concept { display: none; animation: fadeIn 0.3s ease; }
.concept.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ═══ CONCEPT HEADER ═══ */
.ch { text-align: center; padding: 48px 24px 40px; }
.ch-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 14px; border-radius: 100px; margin-bottom: 18px; font-family: var(--font); }
.ch-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.ch h2 { font-size: clamp(22px, 2.8vw, 34px); font-weight: 600; letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 12px; }
.ch h2 em { font-style: normal; color: var(--blue); }
.ch p { color: var(--text-dim); font-size: 15px; max-width: 540px; margin: 0 auto; line-height: 1.65; }
.c-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px 64px; }

/* ═══ SHARED: Card ═══ */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, background 0.3s; }
.card:hover { border-color: var(--border2); }

/* ═══ SHARED: Toggle ═══ */
.tgl { position: relative; width: 38px; height: 20px; cursor: pointer; display: inline-flex; flex-shrink: 0; }
.tgl input { opacity: 0; width: 0; height: 0; position: absolute; }
.tgl .sl { position: absolute; inset: 0; background: var(--border2); border-radius: 100px; transition: all 0.22s; }
.tgl .sl::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--text-muted); top: 3px; left: 3px; transition: all 0.22s; }
.tgl input:checked + .sl { background: var(--blue); }
.tgl input:checked + .sl::after { transform: translateX(18px); background: #fff; }

/* ═══ SHARED: Info btn ═══ */
.ibtn { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border2); background: none; color: var(--text-muted); font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.18s; flex-shrink: 0; font-family: var(--font); line-height: 1; }
.ibtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

/* Tooltip Portal */
#tt-portal { position: fixed; width: 240px; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; z-index: 99999; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2); opacity: 0; transform: translateY(4px); transition: opacity 0.15s ease, transform 0.15s ease; display: none; }
[data-theme="light"] #tt-portal { box-shadow: 0 8px 24px rgba(0,30,80,0.14), 0 2px 6px rgba(0,30,80,0.08); }
#tt-portal.show { opacity: 1; transform: translateY(0); display: block; }
#tt-portal .tt-arrow { position: absolute; width: 10px; height: 10px; background: var(--surface); border-right: 1px solid var(--border2); border-bottom: 1px solid var(--border2); transform: rotate(45deg); }
.tt-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.tt-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.tt-list li { font-size: 11px; color: var(--text-dim); display: flex; gap: 7px; line-height: 1.4; }
.tt-list li::before { content: '·'; color: var(--blue); font-size: 14px; line-height: 1; flex-shrink: 0; }
.tt-avail { margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); }

/* ═══ SHARED: Total Bar ═══ */
.tot-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: var(--rx); background: var(--blue-dim); border: 1px solid rgba(59,130,246,0.2); margin-top: 12px; }
.tot-lbl { font-size: 11px; color: var(--text-dim); font-family: var(--font); letter-spacing: 0.04em; text-transform: uppercase; }
.tot-val { font-size: 15px; font-weight: 700; color: var(--blue); }
.tot-val .dm { font-size: 10px; color: var(--text-muted); font-weight: 400; }

/* ═══ SHARED: Side Panel ═══ */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; visibility: hidden; transition: all 0.3s; backdrop-filter: blur(6px); }
.ov.open { opacity: 1; visibility: visible; }
.pnl { position: fixed; top: 0; right: 0; width: 420px; max-width: 92vw; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 999; transform: translateX(100%); transition: transform 0.36s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; display: flex; flex-direction: column; }
.pnl.open { transform: translateX(0); }
.pnl-hd { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.pnl-hd-t { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font); }
.pnl-x { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: none; color: var(--text-dim); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.pnl-x:hover { background: var(--surface-hover); color: var(--text); }
.pnl-bd { padding: 22px 22px 0; flex: 1; }
.pnl-icon { width: 52px; height: 52px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--input-bg); margin-bottom: 14px; }
.pnl-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; }
.pnl-price { font-size: 20px; font-weight: 600; color: var(--blue); margin-bottom: 14px; }
.pnl-price .dm { color: var(--text-muted); font-size: 11px; font-weight: 400; }
.pnl-desc { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 20px; }
.pnl-sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; font-family: var(--font); }
.pnl-fl { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.pnl-fl li { display: flex; align-items: flex-start; gap: 9px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.pnl-fl li .ck { width: 18px; height: 18px; border-radius: 50%; background: var(--blue-dim); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; margin-top: 2px; }
.pnl-tiers { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 20px; }
.pnl-tier { text-align: center; padding: 10px 6px; border-radius: var(--rx); border: 1px solid var(--border); background: var(--surface2); }
.pnl-tier-n { font-size: 10px; font-weight: 600; margin-bottom: 3px; }
.pnl-tier-p { font-size: 12px; font-weight: 700; }
.pnl-uc { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--rs); padding: 14px; margin-bottom: 22px; }
.pnl-uc-l { font-size: 10px; color: var(--blue); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; font-family: var(--font); }
.pnl-uc-t { font-size: 12px; color: var(--text-dim); line-height: 1.6; font-style: italic; }
.pnl-ft { padding: 16px 22px; border-top: 1px solid var(--border); flex-shrink: 0; }
.pnl-cta { width: 100%; padding: 13px; border-radius: var(--rs); font-size: 14px; font-weight: 700; background: var(--blue); color: #fff; border: none; cursor: pointer; transition: all 0.2s; font-family: var(--font); }
.pnl-cta:hover { background: var(--blue-h); transform: translateY(-1px); box-shadow: 0 4px 20px var(--blue-glow); }

/* Tags */
.tag { font-size: 9px; font-family: var(--font); padding: 2px 7px; border-radius: 100px; font-weight: 500; }
.tag-new { background: var(--tag-new-bg); color: var(--tag-new-color); }
.tag-ai { background: var(--purple-dim); color: var(--purple); }
.tag-pop { background: var(--blue); color: #fff; }

/* Tier feature lists */
.tier-feat-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.tier-feat-list li { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; line-height: 1.4; }
.tier-feat-check { font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px; width: 14px; text-align: center; }
.tier-feat-text { color: var(--text-dim); }
.tier-feat-note { font-size: 10px; color: var(--text-muted); margin-left: 5px; background: var(--input-bg); padding: 1px 6px; border-radius: 4px; font-weight: 500; }

.tier-s { color: var(--green); }
.tier-p { color: var(--blue); }
.tier-b { color: var(--orange); }
.tier-e { color: var(--purple); }

/* Buttons */
.btn { padding: 12px 26px; border-radius: var(--rs); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; font-family: var(--font); }
.btn-pri { background: var(--blue); color: #fff; }
.btn-pri:hover { background: var(--blue-h); transform: translateY(-1px); box-shadow: 0 4px 18px var(--blue-glow); }

/* ═══ C2: IN-TIER ═══ */
.c2-tiers { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; align-items: start; }
@media (max-width:1100px) { .c2-tiers { grid-template-columns: repeat(2,1fr); } }
@media (max-width:600px) { .c2-tiers { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; } }
.c2-tier { animation: fadeUp 0.32s ease both; position: relative; overflow: hidden; }
.c2-tier:nth-child(1){animation-delay:.04s}.c2-tier:nth-child(2){animation-delay:.09s}.c2-tier:nth-child(3){animation-delay:.14s;border-color:rgba(245,158,11,0.35);box-shadow:0 0 32px var(--orange-dim);}.c2-tier:nth-child(4){animation-delay:.19s}
.c2-popular-strip { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--orange); }
.c2-tier-hd { margin-bottom: 16px; }
.c2-tier-n { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 5px; font-family: var(--font); }
.c2-tier-price { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.c2-tier-price .dm { font-size: 12px; color: var(--text-dim); font-weight: 400; }
.c2-tier-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-family: var(--font); }
.c2-divider { height: 1px; background: var(--border); margin: 16px 0; }
.c2-acc-btn { width: 100%; background: none; border: none; color: var(--text-dim); font-family: var(--font); font-size: 11px; font-weight: 600; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; text-transform: uppercase; letter-spacing: 0.07em; }
.c2-acc-btn .arr { transition: transform 0.3s; font-size: 12px; color: var(--text-muted); }
.c2-acc-btn.open { color: var(--text); }
.c2-acc-btn.open .arr { transform: rotate(180deg); }
.c2-acc { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.c2-acc.open { max-height: 800px; overflow: visible; }
.c2-acc-inner { display: flex; flex-direction: column; gap: 6px; padding-bottom: 4px; }
.c2-row { display: flex; align-items: center; gap: 7px; padding: 8px 10px; border-radius: var(--rx); background: var(--input-bg); border: 1px solid var(--border); transition: border-color 0.15s; position: relative; }
.c2-row:hover { border-color: var(--border2); }
.c2-ri { font-size: 14px; flex-shrink: 0; }
.c2-rn { font-size: 11px; font-weight: 500; flex: 1; min-width: 0; }
.c2-rp { font-size: 10px; color: var(--blue); white-space: nowrap; font-weight: 600; }
.c2-rp.inc { color: var(--green); }

/* ═══ C5: DRAWER ═══ */
.c5-tiers { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; align-items: start; }
@media (max-width:1100px) { .c5-tiers { grid-template-columns: repeat(2,1fr); } }
@media (max-width:600px) { .c5-tiers { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; } }
.c5-tier { animation: fadeUp 0.32s ease both; position: relative; overflow: hidden; }
.c5-tier:nth-child(1){animation-delay:.04s}.c5-tier:nth-child(2){animation-delay:.09s}.c5-tier:nth-child(3){animation-delay:.14s;border-color:rgba(245,158,11,0.35);box-shadow:0 0 32px var(--orange-dim);}.c5-tier:nth-child(4){animation-delay:.19s}
.c5-pop-strip { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--orange); }
.tier-tagline { font-size: 12px; color: var(--text-dim); line-height: 1.45; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.c5-cbtn { width: 100%; padding: 10px 14px; border-radius: var(--rs); font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px dashed var(--border2); background: var(--input-bg); color: var(--text-dim); display: flex; align-items: center; justify-content: center; gap: 8px; }
.c5-cbtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.c5-cbtn .ci { font-size: 14px; transition: transform 0.3s; display: inline-block; }
.c5-cbtn.open { border-style: solid; border-color: rgba(59,130,246,0.3); color: var(--blue); background: var(--blue-dim); }
.c5-cbtn.open .ci { transform: rotate(45deg); }
.c5-dr { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.16,1,0.3,1); }
.c5-dr.open { max-height: 800px; margin-top: 14px; overflow: visible; }
.c5-dr-inner { display: flex; flex-direction: column; gap: 6px; }
.c5-dr-t { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 4px; font-family: var(--font); }
.c5-row { display: flex; align-items: center; gap: 7px; padding: 8px 10px; border-radius: var(--rx); background: var(--input-bg); border: 1px solid var(--border); transition: border-color 0.15s; position: relative; }
.c5-row:hover { border-color: var(--border2); }
.c5-row-n { font-size: 11px; font-weight: 500; flex: 1; min-width: 0; }
.c5-row-p { font-size: 10px; white-space: nowrap; font-weight: 600; }

/* ═══ Billing toggle ═══ */
.billing-toggle { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 28px; }
.billing-opt { font-size: 13px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; font-family: var(--font); }
.billing-opt.active { color: var(--text); font-weight: 600; }
.billing-save { font-size: 10px; color: var(--green); background: var(--green-dim); padding: 2px 8px; border-radius: 100px; font-weight: 600; }
.billing-track { width: 42px; height: 22px; border-radius: 100px; background: var(--border2); cursor: pointer; position: relative; transition: background 0.25s; flex-shrink: 0; }
.billing-track.annual { background: var(--green); }
.billing-track-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--text-muted); position: absolute; top: 3px; left: 3px; transition: all 0.25s; }
.billing-track.annual .billing-track-thumb { left: 23px; background: #fff; }

@media (max-width: 600px) {
  .ch { padding: 32px 16px 28px; }
  .c-inner { padding: 0 14px 48px; }
  .nav-inner { padding: 0 14px; gap: 8px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">

// TOOLTIP
let _ttEl = null, _ttTimer = null;
function _getTT() {
  if (!_ttEl) {
    _ttEl = document.createElement('div');
    _ttEl.id = 'tt-portal';
    _ttEl.innerHTML = '<div class="tt-arrow" id="tt-arrow"></div><div id="tt-inner"></div>';
    document.body.appendChild(_ttEl);
  }
  return _ttEl;
}
function showTooltip(triggerEl, idx) {
  clearTimeout(_ttTimer);
  const a = ADDONS[idx];
  const tt = _getTT();
  document.getElementById('tt-inner').innerHTML =
    `<div class="tt-name">${a.icon} ${a.name}</div>
     <ul class="tt-list">${a.tt.map(t => `<li>${t}</li>`).join('')}</ul>
     <div class="tt-avail">Available on: ${a.ttCompat}</div>`;
  tt.style.display = 'block';
  tt.classList.remove('show');
  const btnR = triggerEl.getBoundingClientRect();
  const ttW = tt.offsetWidth;
  const ttH = tt.offsetHeight;
  const gap = 10, arrowSize = 5;
  const arrow = document.getElementById('tt-arrow');
  let top, arrowOnBottom;
  if (btnR.top - ttH - gap > 8) { top = btnR.top - ttH - gap; arrowOnBottom = true; }
  else { top = btnR.bottom + gap; arrowOnBottom = false; }
  let left = btnR.left + btnR.width / 2 - ttW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - ttW - 8));
  tt.style.left = left + 'px';
  tt.style.top = (top + window.scrollY) + 'px';
  const arrowLeft = (btnR.left + btnR.width / 2) - left - arrowSize;
  arrow.style.left = Math.max(8, Math.min(arrowLeft, ttW - 18)) + 'px';
  if (arrowOnBottom) {
    arrow.style.bottom = (-arrowSize - 1) + 'px'; arrow.style.top = 'auto';
    arrow.style.transform = 'rotate(45deg)';
    arrow.style.borderRight = '1px solid var(--border2)'; arrow.style.borderBottom = '1px solid var(--border2)';
    arrow.style.borderTop = 'none'; arrow.style.borderLeft = 'none';
  } else {
    arrow.style.top = (-arrowSize - 1) + 'px'; arrow.style.bottom = 'auto';
    arrow.style.transform = 'rotate(225deg)';
    arrow.style.borderRight = '1px solid var(--border2)'; arrow.style.borderBottom = '1px solid var(--border2)';
    arrow.style.borderTop = 'none'; arrow.style.borderLeft = 'none';
  }
  requestAnimationFrame(() => tt.classList.add('show'));
}
function hideTooltip(delay = 120) {
  clearTimeout(_ttTimer);
  _ttTimer = setTimeout(() => {
    if (_ttEl) {
      _ttEl.classList.remove('show');
      setTimeout(() => { if (_ttEl && !_ttEl.classList.contains('show')) _ttEl.style.display = 'none'; }, 160);
    }
  }, delay);
}
document.addEventListener('mouseover', e => {
  const btn = e.target.closest('.ibtn[data-tt]');
  if (btn) showTooltip(btn, parseInt(btn.dataset.tt));
});
document.addEventListener('mouseout', e => {
  const btn = e.target.closest('.ibtn[data-tt]');
  if (btn) hideTooltip();
});

      <div class="c2-tier-hd">
        <div class="c2-tier-n ${p.color}">${p.icon} ${p.label}${isPop ? ` <span class="tag tag-pop" style="font-size:8px">POPULAR</span>` : ''}</div>
        <div class="c2-tier-price">${fmtPlanPrice(p)}</div>
        <div class="c2-tier-sub">${p.tagline}</div>
      </div>
      <div class="c2-divider"></div>
      ${planFeaturesHTML(p)}
      <div class="c2-divider"></div>
      <button class="c2-acc-btn" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        Add-ons <span class="arr">▾</span>
      </button>
      <div class="c2-acc">
        <div class="c2-acc-inner" id="it-${p.id}"></div>
      </div>
    </div>`;
  });
  h += `</div></div>`;
  document.getElementById('c-intier').innerHTML = h;
  PLANS.forEach(p => renderInTierAddons(p.id));
}
function renderInTierAddons(tierId) {
  const el = document.getElementById('it-' + tierId);
  if (!el) return;
  const plan = PLANS.find(p => p.id === tierId);
  let html = '';
  ADDONS.forEach((a, i) => {
    const price = a.pricing[tierId];
    if (price === null) return;
    const isInc = price === 0;
    const on = S.intier[tierId][i] || false;
    html += `<div class="c2-row">
      <span class="c2-ri">${a.icon}</span>
      <span class="c2-rn">${a.name} ${a.tags.map(t=>`<span class="tag tag-${t}" style="margin-left:4px">${t.toUpperCase()}</span>`).join('')}</span>
      <span class="c2-rp ${isInc?'inc':''}">${isInc ? '✓ Incl.' : `$${price}/u`}</span>
      <button class="ibtn" data-tt="${i}" onclick="openPanel(${i})">ⓘ</button>
      ${!isInc ? `<label class="tgl"><input type="checkbox" ${on?'checked':''} onchange="S.intier['${tierId}'][${i}]=this.checked;renderInTierAddons('${tierId}')"><span class="sl"></span></label>` : ''}
    </div>`;
  });
  const base = getPrice(plan.price) || 0;
  const add = calcTotal(S.intier[tierId], tierId);
  html += `<div class="tot-bar">
    <span class="tot-lbl">Per user total</span>
    <span class="tot-val">${base > 0 ? `$${base+add}` : 'Custom'}<span class="dm">/mo</span></span>
  </div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════════
function renderDrawer() {
  let h = chHTML(1);
  h += billingHTML();
  h += `<div class="c-inner"><div class="c5-tiers">`;
  PLANS.forEach((p, pi) => {
    const isPop = pi === 2;
    h += `<div class="card c5-tier">
      ${isPop ? '<div class="c5-pop-strip"></div>' : ''}
      <div class="c2-tier-n ${p.color}" style="margin-bottom:5px">${p.icon} ${p.label}${isPop ? `&nbsp;<span class="tag tag-pop" style="font-size:8px">POPULAR</span>` : ''}</div>
      <div class="c2-tier-price">${fmtPlanPrice(p)}</div>
      <div class="tier-tagline">${p.tagline}</div>
      ${planFeaturesHTML(p)}
      <button class="c5-cbtn" id="drbtn-${p.id}" onclick="drToggle('${p.id}',this)">
        <span class="ci">+</span> Customize with Add-ons
      </button>
      <div class="c5-dr" id="dr-${p.id}">
        <div class="c5-dr-inner" id="dri-${p.id}"></div>
      </div>
    </div>`;
  });
  h += `</div></div>`;
  document.getElementById('c-drawer').innerHTML = h;
}
function drToggle(tierId, btn) {
  const dr = document.getElementById('dr-' + tierId);
  const isOpen = dr.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  dr.classList.toggle('open', !isOpen);
  if (!isOpen) renderDrawerAddons(tierId);
}
function renderDrawerAddons(tierId) {
  const el = document.getElementById('dri-' + tierId);
  if (!el) return;
  const plan = PLANS.find(p => p.id === tierId);
  let html = `<div class="c5-dr-t">Available Add-ons</div>`;
  ADDONS.forEach((a, i) => {
    const price = a.pricing[tierId];
    if (price === null) return;
    const isInc = price === 0;
    const on = S.drawer[tierId][i] || false;
    html += `<div class="c5-row">
      <span style="font-size:14px">${a.icon}</span>
      <span class="c5-row-n">${a.name} ${a.tags.map(t=>`<span class="tag tag-${t}" style="margin-left:4px">${t.toUpperCase()}</span>`).join('')}</span>
      <span class="c5-row-p" style="color:${isInc?'var(--green)':'var(--blue)'}">${isInc ? '✓ Incl.' : `$${price}/u`}</span>
      <button class="ibtn" data-tt="${i}" onclick="openPanel(${i})">ⓘ</button>
      ${!isInc ? `<label class="tgl"><input type="checkbox" ${on?'checked':''} onchange="S.drawer['${tierId}'][${i}]=this.checked;renderDrawerAddons('${tierId}')"><span class="sl"></span></label>` : ''}
    </div>`;
  });
  const base = getPrice(plan.price) || 0;
  const add = calcTotal(S.drawer[tierId], tierId);
  html += `<div class="tot-bar">
    <span class="tot-lbl">Per user total</span>
    <span class="tot-val">${base > 0 ? `$${base+add}` : 'Custom'}<span class="dm">/mo</span></span>
  </div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════
function renderAll() {
  renderInTier();
  renderDrawer();
}

renderTabs();
renderAll();
</script>
</body>
</html>
