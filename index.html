<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>talyvn — Pricing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');

:root { --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
[data-theme="dark"] {
  --bg: #080B0F; --bg2: #0D1117; --surface: #111620; --surface2: #161C28;
  --surface-hover: #1B2233; --border: #1E2738; --border2: #273044;
  --text: #E2E8F5; --text-dim: #7A8BA8; --text-muted: #3D4F6A;
  --nav-bg: rgba(8,11,15,0.94);
  --input-bg: rgba(255,255,255,0.04);
  --tag-new-bg: rgba(251,146,60,0.12); --tag-new-color: #FB923C;
  --cat-hover: rgba(255,255,255,0.02);
}
[data-theme="light"] {
  --bg: #F4F6FB; --bg2: #EDF0F7; --surface: #FFFFFF; --surface2: #F8FAFD;
  --surface-hover: #F0F3FA; --border: #DDE2EF; --border2: #C8CFDF;
  --text: #1A2540; --text-dim: #4B5C7A; --text-muted: #92A0BA;
  --nav-bg: rgba(244,246,251,0.94);
  --input-bg: rgba(0,0,0,0.03);
  --tag-new-bg: rgba(251,146,60,0.1); --tag-new-color: #EA7914;
  --cat-hover: rgba(0,0,0,0.015);
}
:root {
  --blue: #3B82F6; --blue-dim: rgba(59,130,246,0.14); --blue-h: #5B9BFF;
  --green: #10B981; --green-dim: rgba(16,185,129,0.14);
  --orange: #F59E0B; --orange-dim: rgba(245,158,11,0.12);
  --purple: #8B5CF6; --purple-dim: rgba(139,92,246,0.14);
  --cyan: #06B6D4; --cyan-dim: rgba(6,182,212,0.13);
  --red: #EF4444; --red-dim: rgba(239,68,68,0.12);
  --pink: #EC4899; --pink-dim: rgba(236,72,153,0.14);
  --r: 14px; --rs: 10px; --rx: 7px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0}
[data-theme="dark"] body::before{background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(59,130,246,.06),transparent),radial-gradient(ellipse 50% 60% at 90% 90%,rgba(139,92,246,.04),transparent)}
[data-theme="light"] body::before{background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(59,130,246,.05),transparent),radial-gradient(ellipse 50% 60% at 90% 90%,rgba(139,92,246,.03),transparent)}

/* ═══ NAV ═══ */
.nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(18px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:8px;height:58px;padding:0 16px}
.logo{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;flex-shrink:0}
.logo em{font-style:normal;color:var(--blue)}
.logo span{font-size:10px;color:var(--text-muted);font-weight:400;margin-left:3px}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding:4px 0;flex:1;margin:0 4px}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:10px;letter-spacing:.02em;padding:6px 10px;border-radius:7px;border:1px solid transparent;background:none;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:var(--font)}
.tab:hover{color:var(--text-dim);background:var(--input-bg)}
.tab.active{color:var(--blue);border-color:rgba(59,130,246,.3);background:var(--blue-dim)}
.tab-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}
.tab.active .tab-dot{opacity:1}
.nav-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.theme-toggle{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:100px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;font-size:11px;color:var(--text-dim);font-family:var(--font);white-space:nowrap;flex-shrink:0}
.theme-toggle:hover{border-color:var(--border2);color:var(--text)}
.theme-toggle svg{width:14px;height:14px;transition:transform .4s}
[data-theme="light"] .theme-toggle svg{transform:rotate(180deg)}
.tt-track{width:30px;height:16px;border-radius:100px;background:var(--border2);position:relative;transition:background .25s;flex-shrink:0}
[data-theme="light"] .tt-track{background:var(--blue)}
.tt-thumb{width:12px;height:12px;border-radius:50%;background:var(--text-muted);position:absolute;top:2px;left:2px;transition:all .25s}
[data-theme="light"] .tt-thumb{left:16px;background:#fff}

/* ═══ PAGE ═══ */
.page{position:relative;z-index:1}
.concept{display:none;animation:fadeIn .3s ease}
.concept.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ch{text-align:center;padding:44px 24px 36px}
.ch-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:16px;font-family:var(--font)}
.ch-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.ch h2{font-size:clamp(22px,2.8vw,34px);font-weight:600;letter-spacing:-.01em;line-height:1.1;margin-bottom:10px}
.ch h2 em{font-style:normal;color:var(--blue)}
.ch p{color:var(--text-dim);font-size:13px;max-width:520px;margin:0 auto;line-height:1.6}
.c-inner{max-width:1320px;margin:0 auto;padding:0 24px 56px}

/* BILLING */
.billing-toggle{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:26px}
.billing-opt{font-size:13px;color:var(--text-muted);cursor:pointer;transition:color .2s}
.billing-opt.active{color:var(--text);font-weight:600}
.billing-save{font-size:10px;color:var(--green);background:var(--green-dim);padding:2px 8px;border-radius:100px;font-weight:600}
.billing-track{width:42px;height:22px;border-radius:100px;background:var(--border2);cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.billing-track.annual{background:var(--green)}
.billing-track-thumb{width:16px;height:16px;border-radius:50%;background:var(--text-muted);position:absolute;top:3px;left:3px;transition:all .25s}
.billing-track.annual .billing-track-thumb{left:23px;background:#fff}

/* ═══ CARD ═══ */
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
@media(max-width:1100px){.tg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.tg{grid-template-columns:1fr;max-width:420px;margin:0 auto}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;animation:fadeUp .32s ease both}
.card:hover{border-color:var(--border2)}
.card.popular{border-color:rgba(245,158,11,.35);box-shadow:0 0 32px var(--orange-dim)}
.pop-strip{position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange)}
.tn{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:4px}
.tier-s{color:var(--green)}.tier-p{color:var(--blue)}.tier-b{color:var(--orange)}.tier-e{color:var(--purple)}
.tp{font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1}
.tp .dm{font-size:12px;color:var(--text-dim);font-weight:400}
.tl{font-size:11px;color:var(--text-muted);margin-top:3px;line-height:1.45}
.tc{width:100%;padding:10px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font);margin-top:14px;border:1px solid var(--border2);background:var(--input-bg);color:var(--text-dim)}
.tc:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.card.popular .tc{background:var(--orange);color:#fff;border-color:var(--orange)}
.card.popular .tc:hover{background:#e6900a}
.tag{font-size:8px;font-family:var(--font);padding:2px 7px;border-radius:100px;font-weight:600;vertical-align:middle;margin-left:4px}
.tag-pop{background:var(--orange);color:#fff}
.td{height:1px;background:var(--border);margin:14px 0 10px}

/* ═══ FEATURES ═══ */
.fl{list-style:none;display:flex;flex-direction:column;gap:4px}
.fl li{display:flex;align-items:flex-start;gap:7px;font-size:11.5px;line-height:1.4;padding:2px 0;color:var(--text-dim)}
.fl .ck{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;width:13px;text-align:center}
.fl .note{font-size:10px;color:var(--text-muted);font-style:italic;margin-left:3px}

/* ═══ C1: CATEGORIZED ═══ */
.cg{margin-bottom:2px}
.cgh{display:flex;align-items:center;gap:6px;padding:6px 4px;border-radius:var(--rx);cursor:pointer;transition:background .15s;user-select:none}
.cgh:hover{background:var(--cat-hover)}
.cgi{font-size:11px;flex-shrink:0}
.cgl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);flex:1}
.cgc{font-size:9px;color:var(--text-muted);background:var(--input-bg);padding:1px 5px;border-radius:100px;font-weight:500}
.cgv{width:13px;height:13px;color:var(--text-muted);transition:transform .25s;flex-shrink:0}
.cgh.open .cgv{transform:rotate(180deg)}
.cgb{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.16,1,.3,1)}
.cgb.open{max-height:500px}
.cgf{padding:2px 0 6px}

/* ═══ C2: HERO + EXPAND ═══ */
.xb{display:flex;align-items:center;gap:5px;margin-top:6px;padding:6px 0;background:none;border:none;font-family:var(--font);font-size:11px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:color .2s;width:100%;justify-content:center;border-radius:var(--rx)}
.xb:hover{color:var(--blue)}
.xb svg{width:13px;height:13px;transition:transform .25s}
.xb.open svg{transform:rotate(180deg)}
.xb.open{color:var(--blue)}
.rw{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1)}
.rw.open{max-height:1000px}
.rl{padding:4px 0 2px;border-top:1px dashed var(--border)}
.rl li{opacity:0;transform:translateY(4px)}
.rw.open .rl li{animation:ri .25s ease forwards}
@keyframes ri{to{opacity:1;transform:translateY(0)}}

/* ═══ C3: TABLE ═══ */
.cw{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ct{width:100%;border-collapse:separate;border-spacing:0;min-width:680px}
.ct th,.ct td{padding:9px 12px;text-align:left;font-size:11.5px;border-bottom:1px solid var(--border)}
.ct th{font-weight:600;position:sticky;top:58px;background:var(--bg);z-index:5}
.ct th:first-child{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.ct .thp{text-align:center;min-width:130px}
.ct .thp .tpn{font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.ct .thp .tpp{font-size:18px;font-weight:600}
.ct .thp .tpp .dm{font-size:10px;color:var(--text-dim);font-weight:400}
.ct td:not(:first-child){text-align:center;color:var(--text-muted);font-size:16px}
.ct td:first-child{color:var(--text-dim);font-size:11.5px}
.ct .sr td{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding-top:16px;border-bottom:1px solid var(--border2);background:var(--bg2)}
.cy{color:var(--green) !important;font-size:13px !important}
.cn{color:var(--text-muted) !important;opacity:.35;font-size:13px !important}
.cv{color:var(--text-dim) !important;font-size:10.5px !important;font-weight:500}

/* ═══ C4: SPECS BAR ═══ */
.sb{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.sp{text-align:center;padding:7px 3px;border-radius:var(--rx);background:var(--input-bg);border:1px solid var(--border)}
.spv{font-size:13px;font-weight:700;display:block;margin-bottom:1px}
.spl{font-size:8.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}

/* ═══ C5: DIFFERENTIATORS ONLY ═══ */
.inherits-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--text-muted);background:var(--input-bg);border:1px solid var(--border);padding:3px 9px;border-radius:100px;margin-bottom:10px}
.inherits-badge .ib-dot{width:5px;height:5px;border-radius:50%}
.new-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.new-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══ C6: TWO COLUMN ═══ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.two-col .col-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.two-col .fl{gap:3px}
.two-col .fl li{font-size:11px}

/* ═══ C7: INNER TABS ═══ */
.itabs{display:flex;gap:2px;margin-bottom:8px;background:var(--input-bg);border-radius:8px;padding:3px;border:1px solid var(--border)}
.itab{flex:1;padding:5px 4px;border-radius:6px;font-size:9.5px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-muted);border:none;background:none;font-family:var(--font)}
.itab:hover{color:var(--text-dim)}
.itab.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.ipanel{display:none;animation:fadeIn .2s ease}
.ipanel.active{display:block}

/* ═══ ADD-ONS (shared) ═══ */
.as{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.at{width:100%;padding:7px 10px;border-radius:var(--rs);font-family:var(--font);font-size:10.5px;font-weight:600;cursor:pointer;transition:all .2s;border:1px dashed var(--border2);background:var(--input-bg);color:var(--text-dim);display:flex;align-items:center;justify-content:center;gap:6px}
.at:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.at .plus{font-size:13px;transition:transform .3s;display:inline-block}
.at.open{border-style:solid;border-color:rgba(59,130,246,.3);color:var(--blue);background:var(--blue-dim)}
.at.open .plus{transform:rotate(45deg)}
.ad{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1)}
.ad.open{max-height:800px;margin-top:8px;overflow:visible}
.ar{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:var(--rx);background:var(--input-bg);border:1px solid var(--border);transition:border-color .15s;font-size:10.5px;margin-bottom:3px}
.ar:hover{border-color:var(--border2)}
.ar .ai{font-size:11px;flex-shrink:0}
.ar .an{font-weight:500;flex:1;min-width:0}
.ar .ap{font-size:9.5px;white-space:nowrap;font-weight:600}
.ar .ap.inc{color:var(--green)}
.ar .ap.paid{color:var(--blue)}
.tsm{font-size:7.5px;padding:1px 4px;border-radius:100px;font-weight:500;margin-left:2px}
.tn-sm{background:var(--tag-new-bg);color:var(--tag-new-color)}
.ta-sm{background:var(--purple-dim);color:var(--purple)}
.ib{width:16px;height:16px;border-radius:50%;border:1px solid var(--border2);background:none;color:var(--text-muted);font-size:9px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0;font-family:var(--font);line-height:1}
.ib:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.tgl{position:relative;width:34px;height:18px;cursor:pointer;display:inline-flex;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl .sl{position:absolute;inset:0;background:var(--border2);border-radius:100px;transition:all .22s}
.tgl .sl::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--text-muted);top:3px;left:3px;transition:all .22s}
.tgl input:checked+.sl{background:var(--blue)}
.tgl input:checked+.sl::after{transform:translateX(16px);background:#fff}
.tb{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;border-radius:var(--rx);background:var(--blue-dim);border:1px solid rgba(59,130,246,.2);margin-top:6px}
.tbl{font-size:9.5px;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase}
.tbv{font-size:13px;font-weight:700;color:var(--blue)}
.tbv .dm{font-size:9px;color:var(--text-muted);font-weight:400}


/* ═══ FOUNDING MEMBER BANNER ═══ */
.fm-banner{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(59,130,246,.08));border:1px solid rgba(16,185,129,.2);border-radius:var(--r);padding:18px 22px;margin:0 auto 24px;max-width:720px;text-align:center;animation:fadeIn .4s ease}
.fm-badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--green);margin-bottom:8px}
.fm-badge::before{content:'⭐'}
.fm-title{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.fm-desc{font-size:11.5px;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.fm-perks{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;margin-bottom:10px}
.fm-perk{font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.fm-perk .ck{color:var(--green);font-size:9px;font-weight:700}
.fm-spots{font-size:10px;color:var(--orange);font-weight:600}
.fm-orig{text-decoration:line-through;color:var(--text-muted);font-size:14px;margin-right:6px;font-weight:400}

/* ═══ SIDE PANEL ═══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;opacity:0;visibility:hidden;transition:all .3s;backdrop-filter:blur(6px)}
.ov.open{opacity:1;visibility:visible}
.pnl{position:fixed;top:0;right:0;width:380px;max-width:92vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:999;transform:translateX(100%);transition:transform .36s cubic-bezier(.16,1,.3,1);overflow-y:auto;display:flex;flex-direction:column}
.pnl.open{transform:translateX(0)}
.pnl-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pnl-hd-t{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.pnl-x{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text-dim);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pnl-x:hover{background:var(--surface-hover);color:var(--text)}
.pnl-bd{padding:18px;flex:1}
.pnl-ico{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--input-bg);margin-bottom:10px}
.pnl-nm{font-size:17px;font-weight:600;margin-bottom:3px}
.pnl-pr{font-size:17px;font-weight:600;color:var(--blue);margin-bottom:10px}
.pnl-pr .dm{color:var(--text-muted);font-size:10px;font-weight:400}
.pnl-ds{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:16px}
.pnl-sc{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:7px}
.pnl-fl{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.pnl-fl li{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--text-dim);line-height:1.5}
.pnl-fl li .ck{width:15px;height:15px;border-radius:50%;background:var(--blue-dim);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;margin-top:2px}
.pnl-ts{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:16px}
.pnl-ti{text-align:center;padding:7px 3px;border-radius:var(--rx);border:1px solid var(--border);background:var(--surface2)}
.pnl-tin{font-size:9px;font-weight:600;margin-bottom:1px}
.pnl-tip{font-size:11px;font-weight:700}
