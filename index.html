<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StaffCo — Pricing Concepts</title>
<style>
  /* Use system UI fonts — guaranteed clean on every OS, no external load needed */
  :root {
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
</style>
<style>
/* ═══ THEME TOKENS ═══ */
[data-theme="dark"] {
  --bg: #080B0F;
  --bg2: #0D1117;
  --surface: #111620;
  --surface2: #161C28;
  --surface-hover: #1B2233;
  --border: #1E2738;
  --border2: #273044;
  --text: #E2E8F5;
  --text-dim: #7A8BA8;
  --text-muted: #3D4F6A;
  --nav-bg: rgba(8,11,15,0.94);
  --shadow: 0 4px 30px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 50px rgba(0,0,0,0.7);
  --tbl-alt: rgba(255,255,255,0.012);
  --tbl-hover: rgba(255,255,255,0.018);
  --input-bg: rgba(255,255,255,0.04);
  --tag-new-bg: rgba(251,146,60,0.12);
  --tag-new-color: #FB923C;
}
[data-theme="light"] {
  --bg: #F4F6FB;
  --bg2: #EDF0F7;
  --surface: #FFFFFF;
  --surface2: #F8FAFD;
  --surface-hover: #F0F3FA;
  --border: #DDE2EF;
  --border2: #C8CFDF;
  --text: #1A2540;
  --text-dim: #4B5C7A;
  --text-muted: #92A0BA;
  --nav-bg: rgba(244,246,251,0.94);
  --shadow: 0 4px 30px rgba(0,30,80,0.08);
  --shadow-lg: 0 8px 50px rgba(0,30,80,0.14);
  --tbl-alt: rgba(0,0,0,0.018);
  --tbl-hover: rgba(0,0,0,0.028);
  --input-bg: rgba(0,0,0,0.03);
  --tag-new-bg: rgba(251,146,60,0.1);
  --tag-new-color: #EA7914;
}
:root {
  --blue: #3B82F6;
  --font-mono: var(--font);
  --font-sans: var(--font);
  --blue-dim: rgba(59,130,246,0.14);
  --blue-glow: rgba(59,130,246,0.22);
  --blue-h: #5B9BFF;
  --green: #10B981;
  --green-dim: rgba(16,185,129,0.14);
  --orange: #F59E0B;
  --orange-dim: rgba(245,158,11,0.12);
  --purple: #8B5CF6;
  --purple-dim: rgba(139,92,246,0.14);
  --cyan: #06B6D4;
  --cyan-dim: rgba(6,182,212,0.13);
  --red: #EF4444;
  --red-dim: rgba(239,68,68,0.12);
  --r: 14px;
  --rs: 10px;
  --rx: 7px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.3s;
}
[data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%, rgba(59,130,246,0.06), transparent),
    radial-gradient(ellipse 50% 60% at 90% 90%, rgba(139,92,246,0.04), transparent);
}
[data-theme="light"] body::before {
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%, rgba(59,130,246,0.05), transparent),
    radial-gradient(ellipse 50% 60% at 90% 90%, rgba(139,92,246,0.03), transparent);
}

/* ═══ NAV ═══ */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(18px) saturate(180%);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}
.nav-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  height: 58px; padding: 0 20px;
}
.logo {
  font-family: var(--font);
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-right: 8px;
  white-space: nowrap;
}
.logo em { font-style: normal; color: var(--blue); }
.logo span { font-size: 10px; font-family: var(--font); color: var(--text-muted); font-weight: 400; letter-spacing: 0; margin-left: 3px; }

/* Tabs */
.tabs {
  display: flex; gap: 2px;
  overflow-x: auto; scrollbar-width: none;
  padding: 4px 0; flex: 1;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-family: var(--font);
  font-size: 10.5px; letter-spacing: 0.03em;
  padding: 7px 13px; border-radius: 8px;
  border: 1px solid transparent;
  background: none; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text-dim); background: var(--input-bg); }
.tab.active { color: var(--blue); border-color: rgba(59,130,246,0.3); background: var(--blue-dim); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.tab.active .tab-dot { opacity: 1; }

/* Dark/Light Toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 8px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 11px; color: var(--text-dim);
  font-family: var(--font);
  white-space: nowrap; flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--border2); color: var(--text); }
.theme-toggle svg { width: 14px; height: 14px; transition: transform 0.4s; }
[data-theme="light"] .theme-toggle svg { transform: rotate(180deg); }
.tt-track {
  width: 30px; height: 16px;
  border-radius: 100px;
  background: var(--border2);
  position: relative; transition: background 0.25s;
  flex-shrink: 0;
}
[data-theme="light"] .tt-track { background: var(--blue); }
.tt-thumb {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--text-muted);
  position: absolute; top: 2px; left: 2px;
  transition: all 0.25s;
}
[data-theme="light"] .tt-thumb { left: 16px; background: #fff; }

/* ═══ PAGE ═══ */
.page { position: relative; z-index: 1; }
.concept { display: none; animation: fadeIn 0.3s ease; }
.concept.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ═══ CONCEPT HEADER ═══ */
.ch {
  text-align: center;
  padding: 48px 24px 40px;
}
.ch-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 100px;
  margin-bottom: 18px;
}
.ch-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.ch h2 {
  font-family: var(--font);
  font-size: clamp(22px, 2.8vw, 34px);
  font-weight: 600; letter-spacing: -0.01em;
  line-height: 1.1; margin-bottom: 12px;
}
.ch h2 em { font-style: normal; color: var(--blue); }
.ch p { color: var(--text-dim); font-size: 15px; max-width: 540px; margin: 0 auto; line-height: 1.65; }
.c-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px 64px; }

/* ═══ SHARED: Card ═══ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, background 0.3s;
}
.card:hover { border-color: var(--border2); }
.card.elevated { box-shadow: var(--shadow); }

/* ═══ SHARED: Toggle ═══ */
.tgl { position: relative; width: 38px; height: 20px; cursor: pointer; display: inline-flex; flex-shrink: 0; }
.tgl input { opacity: 0; width: 0; height: 0; position: absolute; }
.tgl .sl { position: absolute; inset: 0; background: var(--border2); border-radius: 100px; transition: all 0.22s; }
.tgl .sl::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--text-muted); top: 3px; left: 3px; transition: all 0.22s; }
.tgl input:checked + .sl { background: var(--blue); }
.tgl input:checked + .sl::after { transform: translateX(18px); background: #fff; }

/* ═══ SHARED: Checkbox ═══ */
.chk { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; color: transparent; transition: all 0.2s; cursor: pointer; flex-shrink: 0; }
.chk.on { border-color: var(--blue); background: var(--blue); color: #fff; }

/* ═══ SHARED: Info btn ═══ */
.ibtn {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1px solid var(--border2); background: none;
  color: var(--text-muted); font-size: 11px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.18s;
  flex-shrink: 0; font-family: var(--font);
  line-height: 1;
}
.ibtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

/* ═══ Tooltip Portal (fixed, never clipped) ═══ */
#tt-portal {
  position: fixed;
  width: 240px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  z-index: 99999;
  pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.15s ease, transform 0.15s ease;
  display: none;
}
[data-theme="light"] #tt-portal {
  box-shadow: 0 8px 24px rgba(0,30,80,0.14), 0 2px 6px rgba(0,30,80,0.08);
}
#tt-portal.show { opacity: 1; transform: translateY(0); display: block; }
#tt-portal .tt-arrow {
  position: absolute;
  width: 10px; height: 10px;
  background: var(--surface);
  border-right: 1px solid var(--border2);
  border-bottom: 1px solid var(--border2);
  transform: rotate(45deg);
}
.tt-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.tt-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.tt-list li { font-size: 11px; color: var(--text-dim); display: flex; gap: 7px; line-height: 1.4; }
.tt-list li::before { content: '·'; color: var(--blue); font-size: 14px; line-height: 1; flex-shrink: 0; }
.tt-avail { margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); }

/* ═══ SHARED: Total Bar ═══ */
.tot-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: var(--rx);
  background: var(--blue-dim);
  border: 1px solid rgba(59,130,246,0.2);
  margin-top: 12px;
}
.tot-lbl { font-size: 11px; color: var(--text-dim); font-family: var(--font); letter-spacing: 0.04em; text-transform: uppercase; }
.tot-val { font-family: var(--font); font-size: 15px; font-weight: 700; color: var(--blue); }
.tot-val .dm { font-size: 10px; color: var(--text-muted); font-weight: 400; }

/* ═══ SHARED: Side Panel ═══ */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; visibility: hidden; transition: all 0.3s; backdrop-filter: blur(6px); }
.ov.open { opacity: 1; visibility: visible; }
.pnl { position: fixed; top: 0; right: 0; width: 420px; max-width: 92vw; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 999; transform: translateX(100%); transition: transform 0.36s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; display: flex; flex-direction: column; }
.pnl.open { transform: translateX(0); }
.pnl-hd { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.pnl-hd-t { font-size: 11px; font-family: var(--font); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.pnl-x { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: none; color: var(--text-dim); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.pnl-x:hover { background: var(--surface-hover); color: var(--text); }
.pnl-bd { padding: 22px 22px 0; flex: 1; }
.pnl-icon { width: 52px; height: 52px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--input-bg); margin-bottom: 14px; }
.pnl-name { font-family: var(--font); font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; }
.pnl-price { font-family: var(--font); font-size: 20px; font-weight: 600; color: var(--blue); margin-bottom: 14px; }
.pnl-price .dm { color: var(--text-muted); font-size: 11px; font-weight: 400; }
.pnl-desc { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 20px; }
.pnl-sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; font-family: var(--font); }
.pnl-fl { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.pnl-fl li { display: flex; align-items: flex-start; gap: 9px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.pnl-fl li .ck { width: 18px; height: 18px; border-radius: 50%; background: var(--blue-dim); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; margin-top: 2px; }
.pnl-tiers { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 20px; }
.pnl-tier { text-align: center; padding: 10px 6px; border-radius: var(--rx); border: 1px solid var(--border); background: var(--surface2); }
.pnl-tier-n { font-size: 10px; font-weight: 600; margin-bottom: 3px; }
.pnl-tier-p { font-family: var(--font); font-size: 12px; font-weight: 700; }
.pnl-uc { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--rs); padding: 14px; margin-bottom: 22px; }
.pnl-uc-l { font-size: 10px; color: var(--blue); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; font-family: var(--font); }
.pnl-uc-t { font-size: 12px; color: var(--text-dim); line-height: 1.6; font-style: italic; }
.pnl-ft { padding: 16px 22px; border-top: 1px solid var(--border); flex-shrink: 0; }
.pnl-cta { width: 100%; padding: 13px; border-radius: var(--rs); font-family: var(--font); font-size: 14px; font-weight: 700; background: var(--blue); color: #fff; border: none; cursor: pointer; transition: all 0.2s; }
.pnl-cta:hover { background: var(--blue-h); transform: translateY(-1px); box-shadow: 0 4px 20px var(--blue-glow); }

/* ═══ SHARED: Tag ═══ */
.tag { font-size: 9px; font-family: var(--font); padding: 2px 7px; border-radius: 100px; font-weight: 500; }
.tag-new { background: var(--tag-new-bg); color: var(--tag-new-color); }
.tag-ai { background: var(--purple-dim); color: var(--purple); }
.tag-pop { background: var(--blue); color: #fff; }

/* ═══ TIER FEATURE LISTS ═══ */
.tier-tagline {
  font-size: 12px; color: var(--text-dim);
  line-height: 1.45; margin-bottom: 16px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.tier-feat-list {
  list-style: none;
  display: flex; flex-direction: column; gap: 7px;
  margin-bottom: 14px;
}
.tier-feat-list.compact { gap: 5px; }
.tier-feat-list li {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12.5px; line-height: 1.4;
}
.tier-feat-list.compact li { font-size: 12px; }
.tier-feat-check {
  font-size: 12px; font-weight: 700;
  flex-shrink: 0; margin-top: 1px; width: 14px; text-align: center;
}
.tier-feat-text { color: var(--text-dim); }
.tier-feat-note {
  font-size: 10px; color: var(--text-muted);
  margin-left: 5px;
  background: var(--input-bg);
  padding: 1px 6px; border-radius: 4px;
  font-weight: 500;
}
.not-list { margin-top: 4px; }

/* ═══ TIER COLORS ═══ */
.tier-s { color: var(--green); }
.tier-p { color: var(--blue); }
.tier-b { color: var(--orange); }
.tier-e { color: var(--purple); }

/* ═══ BUTTONS ═══ */
.btn { padding: 12px 26px; border-radius: var(--rs); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
.btn-pri { background: var(--blue); color: #fff; }
.btn-pri:hover { background: var(--blue-h); transform: translateY(-1px); box-shadow: 0 4px 18px var(--blue-glow); }
.btn-sec { background: none; border: 1px solid var(--border2); color: var(--text-dim); }
.btn-sec:hover { border-color: var(--text-dim); color: var(--text); background: var(--input-bg); }
.btn-grn { background: var(--green); color: #fff; font-weight: 700; }
.btn-grn:hover { filter: brightness(1.1); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ══════════════════════════════════════════
   C2: IN-TIER (EMBEDDED)
══════════════════════════════════════════ */
.c2-tiers { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; align-items: start; }
@media (max-width:1100px) { .c2-tiers { grid-template-columns: repeat(2,1fr); } }
@media (max-width:600px) { .c2-tiers { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; } }

.c2-tier { animation: fadeUp 0.32s ease both; position: relative; overflow: hidden; }
.c2-tier:nth-child(1){animation-delay:.04s}.c2-tier:nth-child(2){animation-delay:.09s}.c2-tier:nth-child(3){animation-delay:.14s;border-color:rgba(245,158,11,0.35);box-shadow:0 0 32px var(--orange-dim);}.c2-tier:nth-child(4){animation-delay:.19s}
.c2-popular-strip { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--orange); }

.c2-tier-hd { margin-bottom: 16px; }
.c2-tier-n { font-family: var(--font); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 5px; }
.c2-tier-price { font-family: var(--font); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.c2-tier-price .dm { font-family: var(--font); font-size: 12px; color: var(--text-dim); font-weight: 400; }
.c2-tier-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-family: var(--font); }
.c2-divider { height: 1px; background: var(--border); margin: 16px 0; }
.c2-acc-btn { width: 100%; background: none; border: none; color: var(--text-dim); font-family: var(--font); font-size: 11px; font-weight: 600; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; text-transform: uppercase; letter-spacing: 0.07em; }
.c2-acc-btn .arr { transition: transform 0.3s; font-size: 12px; color: var(--text-muted); }
.c2-acc-btn.open { color: var(--text); }
.c2-acc-btn.open .arr { transform: rotate(180deg); }
.c2-acc { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
/* C6 plan features in summary */
.c6-plan-feats { margin:8px 0 4px; }
.c6-plan-feats .tier-feat-list { gap:4px; margin-bottom:0; }
.c6-plan-feats .tier-feat-list li { font-size:11.5px; }

.c2-acc.open { max-height: 600px; overflow: visible; }
.c2-acc-inner { display: flex; flex-direction: column; gap: 6px; padding-bottom: 4px; }
.c2-row { display: flex; align-items: center; gap: 7px; padding: 8px 10px; border-radius: var(--rx); background: var(--input-bg); border: 1px solid var(--border); transition: border-color 0.15s; position: relative; }
.c2-row:hover { border-color: var(--border2); }
.c2-ri { font-size: 14px; flex-shrink: 0; }
.c2-rn { font-size: 11px; font-weight: 500; flex: 1; min-width: 0; }
.c2-rp { font-family: var(--font); font-size: 10px; color: var(--blue); white-space: nowrap; font-weight: 600; }
.c2-rp.inc { color: var(--green); }

/* ══════════════════════════════════════════
   C3: PLAN BUILDER
══════════════════════════════════════════ */
.c3-steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 40px; flex-wrap: wrap; }
.c3-sw { text-align: center; }
.c3-dot { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--text-muted); transition: all 0.3s; cursor: pointer; margin: 0 auto; }
.c3-dot.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

// ═══════════════════════════════════════════
// TOOLTIP PORTAL — hover shows info, click opens panel
// ═══════════════════════════════════════════
let _ttEl = null;
let _ttTimer = null;

function _getTT() {
  if (!_ttEl) {
    _ttEl = document.createElement('div');
    _ttEl.id = 'tt-portal';
    _ttEl.innerHTML = '<div class="tt-arrow" id="tt-arrow"></div><div id="tt-inner"></div>';
    document.body.appendChild(_ttEl);
  }
  return _ttEl;
}

function showTooltip(triggerEl, idx) {
  clearTimeout(_ttTimer);
  const a = ADDONS[idx];
  const tt = _getTT();

  document.getElementById('tt-inner').innerHTML =
    `<div class="tt-name">${a.icon} ${a.name}</div>
     <ul class="tt-list">${a.tt.map(t => `<li>${t}</li>`).join('')}</ul>
     <div class="tt-avail">Available on: ${a.ttCompat}</div>`;

  // Show off-screen first to measure
  tt.style.display = 'block';
  tt.classList.remove('show');

  const btnR = triggerEl.getBoundingClientRect();
  const ttW = tt.offsetWidth;
  const ttH = tt.offsetHeight;
  const gap = 10;
  const arrowSize = 5;
  const arrow = document.getElementById('tt-arrow');

  // Prefer above, fall back to below
  let top, arrowOnBottom;
  if (btnR.top - ttH - gap > 8) {
    top = btnR.top - ttH - gap;
    arrowOnBottom = true;
  } else {
    top = btnR.bottom + gap;
    arrowOnBottom = false;
  }

  // Horizontal: centre on button, clamp to viewport
  let left = btnR.left + btnR.width / 2 - ttW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - ttW - 8));

  tt.style.left = left + 'px';
  tt.style.top = (top + window.scrollY) + 'px';

  // Position arrow to point at button centre
  const arrowLeft = (btnR.left + btnR.width / 2) - left - arrowSize;
  arrow.style.left = Math.max(8, Math.min(arrowLeft, ttW - 18)) + 'px';

  if (arrowOnBottom) {
    arrow.style.bottom = (-arrowSize - 1) + 'px';
    arrow.style.top = 'auto';
    arrow.style.transform = 'rotate(45deg)';
    arrow.style.borderRight = '1px solid var(--border2)';
    arrow.style.borderBottom = '1px solid var(--border2)';
    arrow.style.borderTop = 'none';
    arrow.style.borderLeft = 'none';
  } else {
    arrow.style.top = (-arrowSize - 1) + 'px';
    arrow.style.bottom = 'auto';
    arrow.style.transform = 'rotate(225deg)';
    arrow.style.borderRight = '1px solid var(--border2)';
    arrow.style.borderBottom = '1px solid var(--border2)';
    arrow.style.borderTop = 'none';
    arrow.style.borderLeft = 'none';
  }

  requestAnimationFrame(() => tt.classList.add('show'));
}

function hideTooltip(delay = 120) {
  clearTimeout(_ttTimer);
  _ttTimer = setTimeout(() => {
    if (_ttEl) {
      _ttEl.classList.remove('show');
      setTimeout(() => { if (_ttEl && !_ttEl.classList.contains('show')) _ttEl.style.display = 'none'; }, 160);
    }
  }, delay);
}

// Event delegation — mouseover/out on any .ibtn[data-tt]
document.addEventListener('mouseover', e => {
  const btn = e.target.closest('.ibtn[data-tt]');
  if (btn) showTooltip(btn, parseInt(btn.dataset.tt));
});
document.addEventListener('mouseout', e => {
  const btn = e.target.closest('.ibtn[data-tt]');
  if (btn) hideTooltip();
});

function planFeaturesHTML(plan, opts = {}) {
  const { compact = false, showNot = false } = opts;
  const colorMap = { starter:'var(--green)', pro:'var(--blue)', business:'var(--orange)', enterprise:'var(--purple)' };
  const color = colorMap[plan.id] || 'var(--blue)';
  let h = `<ul class="tier-feat-list ${compact ? 'compact' : ''}">`;
  plan.features.forEach(f => {
    h += `<li>
      <span class="tier-feat-check" style="color:${color}">✓</span>
      <span class="tier-feat-text">${f.text}${f.note ? `<span class="tier-feat-note">${f.note}</span>` : ''}</span>
    </li>`;
  });
  h += `</ul>`;
  if (showNot && plan.notIncluded.length) {
    h += `<ul class="tier-feat-list not-list">`;
    plan.notIncluded.forEach(f => {
      h += `<li><span class="tier-feat-check" style="color:var(--text-muted)">–</span><span class="tier-feat-text" style="color:var(--text-muted)">${f}</span></li>`;
    });
    h += `</ul>`;
  }
  return h;
}

function calcTotal(addonState, tierId) {
  let t = 0;
  Object.entries(addonState).forEach(([i, on]) => {
    if (on) {
      const p = ADDONS[i].pricing[tierId];
      if (p && p > 0) t += p;
    }
  });
  return t;
}

        ${isActive ? `<div class="c4-active-strip"></div>` : ''}
        <div class="c4-th-n ${p.color}">${p.label}</div>
        <div class="c4-th-p">${p.price ? `$${p.price}<span class="dm">/u/mo</span>` : `<span style="font-size:13px;font-weight:400;color:var(--text-muted)">Custom</span>`}</div>
        ${!isActive ? `<div class="c4-th-hint">click to select</div>` : `<div class="c4-th-hint selected">✓ selected</div>`}
      </th>`;
    }).join('')}
  </tr></thead><tbody>`;

  // Core features
  h += `<tr class="c4-sec-row"><td colspan="5"><span class="c4-sec-lbl">Core Features</span></td></tr>`;
  const coreFeatures = [
    ['Time tracking',        '✓',              '✓',         '✓',         '✓'],
    ['Screenshots',          '5 min interval', 'Custom',    'Custom',    'Custom'],
    ['App & web monitoring', '✓',              '✓',         '✓',         '✓'],
    ['Projects',             'Up to 3',        'Unlimited', 'Unlimited', 'Unlimited'],
    ['Users',                'Up to 10',       'Unlimited', 'Unlimited', 'Unlimited'],
    ['Data retention',       '3 months',       '6 months',  '24 months', 'Unlimited'],
    ['Shift scheduling',     '—',              '—',         '✓',         '✓'],
    ['SSO / SAML',           '—',              '—',         '—',         '✓'],
    ['API access',           '—',              '✓',         '✓',         '✓'],
  ];
  coreFeatures.forEach(row => {
    h += `<tr>${row.map((v, ci) => {
      const cls = ci > 0 && PLANS[ci-1].id === selTier ? ' class="c4-col-active"' : '';
      const val = v==='✓' ? `<span class="c4-yes">✓</span>` : v==='—' ? `<span class="c4-no">—</span>` : v;
      return `<td${cls}>${val}</td>`;
    }).join('')}</tr>`;
  });

  // Add-ons
  h += `<tr class="c4-sec-row"><td colspan="5"><span class="c4-sec-lbl">Optional Add-ons</span></td></tr>`;
  ADDONS.forEach((a, i) => {
    const price = a.pricing[selTier];
    const on = (S.c4.addons[i] && price !== null && price > 0) || false;
    h += `<tr>
      <td>
        <div class="c4-addon-name">
          <span>${a.icon}</span>
          <span>${a.name}</span>
          ${a.tags.map(t=>`<span class="tag tag-${t}">${t.toUpperCase()}</span>`).join('')}
          <button class="ibtn" data-tt="${i}" onclick="openPanel(${i})">ⓘ</button>
        </div>
      </td>
      ${PLANS.map((p, pi) => {
        const isActive = p.id === selTier;
        const fp = a.pricing[p.id];
        let cellVal = fmtPrice(fp, p.id);
        // For active column, show toggle if not included/N/A
        if (isActive && fp !== null && fp > 0) {
          cellVal = `<div class="c4-addon-cell">
            ${fmtPrice(fp, p.id)}
            <label class="tgl" style="margin-left:8px"><input type="checkbox" ${on?'checked':''} onchange="S.c4.addons[${i}]=this.checked;renderC4()"><span class="sl"></span></label>
          </div>`;
        }
        return `<td class="${isActive ? 'c4-col-active' : ''}">${cellVal}</td>`;
      }).join('')}
    </tr>`;
  });

  // Interactive total row
  const base = selPlan.price || 0;
  const addonsTotal = calcTotal(S.c4.addons, selTier);
  const total = base + addonsTotal;
  h += `<tr class="c4-sec-row"><td colspan="5"><span class="c4-sec-lbl">${selPlan.label} Plan Total</span></td></tr>`;
  h += `<tr class="c4-total-row">
    <td style="font-weight:600;font-size:13px">${selPlan.label} + selected add-ons</td>
    ${PLANS.map(p => {
      const isActive = p.id === selTier;
      if (isActive) {
        return `<td class="c4-col-active">
          <span style="font-size:18px;font-weight:700;color:var(--green)">${total > 0 ? `$${total}` : 'Custom'}</span>
          <span style="font-size:11px;color:var(--text-muted);display:block;margin-top:2px">per user / mo</span>
        </td>`;
      }
      const b = p.price || 0;
      return `<td style="color:var(--text-muted);font-size:12px">${b > 0 ? `from $${b}/u` : 'Custom'}</td>`;
    }).join('')}
  </tr>`;

  h += `</tbody></table></div>`;

  // Add-on toggles for selected tier
  const toggleable = ADDONS.filter((a,i) => a.pricing[selTier] !== null && a.pricing[selTier] > 0);
  if (toggleable.length) {
    h += `<div class="c4-addon-toggles">
      <span class="c4-toggle-lbl">Toggle add-ons for <strong>${selPlan.label}</strong>:</span>`;
    ADDONS.forEach((a, i) => {
      const price = a.pricing[selTier];
      if (price === null || price === 0) return;
      const on = S.c4.addons[i] || false;
      h += `<label class="c4-tog-pill ${on?'on':''}">
        <input type="checkbox" ${on?'checked':''} onchange="S.c4.addons[${i}]=this.checked;renderC4()">
        ${a.icon} ${a.name} <span class="c4-pill-price">+$${price}/u</span>
      </label>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  document.getElementById('c4').innerHTML = h;
}

// ═══════════════════════════════════════════
// C5: DRAWER PER TIER
// ═══════════════════════════════════════════
function renderC5() {
  let h = chHTML(3);
  h += `<div class="c-inner"><div class="c5-tiers">`;
  PLANS.forEach((p, pi) => {
    const isPop = pi === 2;
    h += `<div class="card c5-tier">
      ${isPop ? '<div class="c5-pop-strip"></div>' : ''}
      <div class="c2-tier-n ${p.color}" style="margin-bottom:5px">${p.icon} ${p.label}${isPop ? `&nbsp;<span class="tag tag-pop" style="font-size:8px">POPULAR</span>` : ''}</div>
      <div class="c2-tier-price">${p.price ? `$${p.price}<span class="dm"> /user/mo</span>` : `<span style="font-size:18px">Custom</span>`}</div>
      <div class="tier-tagline">${p.tagline}</div>
      ${planFeaturesHTML(p, { compact: true })}
      <button class="c5-cbtn" id="c5btn-${p.id}" onclick="c5Toggle('${p.id}',this)">
        <span class="ci">+</span> Customize with Add-ons
      </button>
      <div class="c5-dr" id="c5dr-${p.id}">
        <div class="c5-dr-inner" id="c5di-${p.id}"></div>
      </div>
    </div>`;
  });
  h += `</div></div>`;
  document.getElementById('c5').innerHTML = h;
}
function c5Toggle(tierId, btn) {
  const dr = document.getElementById('c5dr-' + tierId);
  const isOpen = dr.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  dr.classList.toggle('open', !isOpen);
  if (!isOpen) renderC5Drawer(tierId);
}
function renderC5Drawer(tierId) {
  const el = document.getElementById('c5di-' + tierId);
  if (!el) return;
  const plan = PLANS.find(p => p.id === tierId);
  let html = `<div class="c5-dr-t">Available Add-ons</div>`;
  ADDONS.forEach((a, i) => {
    const price = a.pricing[tierId];
    if (price === null) return;
    const isInc = price === 0;
    const on = S.c5[tierId][i] || false;
    html += `<div class="c5-row">
      <span style="font-size:14px">${a.icon}</span>
      <span class="c5-row-n">${a.name}</span>
      <span class="c5-row-p" style="color:${isInc?'var(--green)':'var(--blue)'}">${isInc ? '✓ Incl.' : `$${price}/u`}</span>
      <button class="ibtn" data-tt="${i}" onclick="openPanel(${i})">ⓘ</button>
      ${!isInc ? `<label class="tgl"><input type="checkbox" ${on?'checked':''} onchange="S.c5['${tierId}'][${i}]=this.checked;renderC5Drawer('${tierId}')"><span class="sl"></span></label>` : ''}
    </div>`;
  });
  const base = plan.price || 0;
  const add = calcTotal(S.c5[tierId], tierId);
  html += `<div class="tot-bar">
    <span class="tot-lbl">Per user total</span>
    <span class="tot-val">${base > 0 ? `$${base+add}` : 'Custom'}<span class="dm">/mo</span></span>
  </div>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// C6: CARDS + STICKY SUMMARY
// ═══════════════════════════════════════════
function renderC6() {
  const tier = S.c6.tier;
  const plan = PLANS.find(p => p.id === tier);
  let h = chHTML(4);
  h += `<div class="c-inner">`;

  // Tier selector strip
  h += `<div class="c6-tier-strip">
    <span class="c6-tier-strip-lbl">Your plan:</span>
    ${PLANS.map(p => `<button class="c6-tier-opt ${tier===p.id?'active':''}" onclick="S.c6.tier='${p.id}';renderC6()">${p.icon} ${p.label}${p.price?` · $${p.price}/u`:''}</button>`).join('')}
  </div>`;

  h += `<div class="c6-wrap"><div class="c6-left">`;

  ADDONS.forEach((a, i) => {
    const price = a.pricing[tier];
    const isNA = price === null;
    const isInc = price === 0;
    const on = !isNA && !isInc && (S.c6.addons[i] || false);
    h += `<div class="card c6-card ${on?'on':''} ${isNA?'na':''}" onclick="${!isNA&&!isInc?`S.c6.addons[${i}]=!S.c6.addons[${i}];renderC6()`:''}">
      <div class="c1-icon">${a.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="c1-top">
          <span class="c1-name">${a.name}</span>
          ${a.tags.map(t=>`<span class="tag tag-${t}">${t.toUpperCase()}</span>`).join('')}
          ${isInc ? '<span class="tag" style="background:var(--green-dim);color:var(--green)">FREE WITH PLAN</span>' : ''}
          ${isNA ? '<span class="tag" style="background:var(--input-bg);color:var(--text-muted)">NOT IN PLAN</span>' : ''}
        </div>
        <div class="c1-desc">${a.full.substring(0,90)}…</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
          <span class="c1-pr ${isInc?'inc':isNA?'':''}" style="${isNA?'color:var(--text-muted)':''}">
            ${isNA ? 'Upgrade to access' : isInc ? '✓ Included free' : `$${price}<span class="dm">/u/mo</span>`}
          </span>
          <button class="ibtn" data-tt="${i}" onclick="event.stopPropagation();openPanel(${i})">ⓘ</button>
        </div>
      </div>
      ${!isNA && !isInc ? `<div class="chk ${on?'on':''}" style="align-self:center">${on?'✓':''}</div>` : ''}
    </div>`;
  });

  h += `</div><div class="c6-sticky">
    <div class="card c6-sum">
      <div class="c6-sum-hd">
        <span class="c6-sum-hl">Order Summary</span>
        <span class="c6-sum-tier">${plan.label} plan</span>
      </div>
      <div class="c6-sum-plan">
        <span class="c6-sum-plan-n">${plan.icon} ${plan.label}</span>
        <span class="c6-sum-plan-p">${plan.price ? `$${plan.price}/u` : 'Custom'}</span>
      </div>
      <div class="c6-plan-feats">
        ${plan.features.slice(0,5).map(f => `<div class="c6-feat-pill"><span style="color:${{'starter':'var(--green)','pro':'var(--blue)','business':'var(--orange)','enterprise':'var(--purple)'}[plan.id]}">✓</span> ${f.text}</div>`).join('')}
      </div>
      <div class="c6-divider"></div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);margin-bottom:8px">Add-ons</div>`;

  let selCount = 0, addonTotal = 0;
  ADDONS.forEach((a, i) => {
    if (S.c6.addons[i] && a.pricing[tier] > 0) {
      selCount++;
      addonTotal += a.pricing[tier];
      h += `<div class="c6-sum-row">
        <span class="nm">${a.icon} ${a.name}</span>
        <span class="pr">+$${a.pricing[tier]}/u</span>
      </div>`;
    }
  });

  if (!selCount) h += `<div class="c6-sum-empty">No add-ons selected yet<br><span style="font-size:10px">Click cards on the left to add</span></div>`;

  const base = plan.price || 0;
  const total = base + addonTotal;
  h += `<div class="c6-divider"></div>
    <div class="c6-total">
      <span class="lbl">Total / user</span>
      <span class="val">${total > 0 ? `$${total}` : 'Custom'}<span class="dm">/mo</span></span>
    </div>
    <div class="c6-note">Billed annually · 14-day free trial<br>Cancel any time, no questions asked</div>
    <button class="c6-cta">Start Free Trial →</button>
  </div></div></div></div>`;

  document.getElementById('c6').innerHTML = h;
}

// ═══════════════════════════════════════════
// CONCEPT HEADER HELPER
// ═══════════════════════════════════════════
function chHTML(idx) {
  const c = CONCEPTS[idx];
  return `<div class="ch">
    <div class="ch-badge" style="color:${c.color};background:${c.colorDim};border:1px solid ${c.colorBorder}">
      Concept ${c.n} — ${c.label}
    </div>
    <h2>${c.title}</h2>
    <p>${c.sub}</p>
  </div>`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderTabs();
renderC2();
renderC3();
renderC4();
renderC5();
renderC6();
</script>
</body>
</html>
